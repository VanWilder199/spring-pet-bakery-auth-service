spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  jwt:
    secret: my-super-secret-key-for-jwt-minimum-32-chars
    expiration: 3600000
    refresh-expiration: 86400000

server:
  port: 8082


